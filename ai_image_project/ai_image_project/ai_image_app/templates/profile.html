<!DOCTYPE html>
<html lang="zh">
{% load static %}

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="ljy" content="width=device-width, initial-scale=1.0">
  <title>文韵智能AI图像生成平台-个人主页</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="shortcut icon" href="{% static 'images/logo/LOGO.png' %}" type="image/x-icon">
  <style>
    :root {
      --nav-bg: rgba(255, 255, 255, 0.9);
      --text-dark: #333;
      --primary-blue: #1890ff;
      --secondary-blue: #e6f7ff;
      --gutter: 24px;
      --transition: all 0.3s ease;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding-top: 80px;
      color: var(--text-dark);
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: var(--nav-bg);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      z-index: 1000;
      padding: 0 var(--gutter);
    }

    .nav-content {
      display: flex;
      height: 64px;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav-logo {
      width: 60px;
      transition: transform 0.3s;
    }

    .nav-logo:hover {
      transform: scale(1.1);
    }

    .nav-menu {
      display: flex;
      gap: 40px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-menu a {
      color: var(--text-dark);
      text-decoration: none;
      font-weight: 500;
      position: relative;
      padding: 8px 0;
    }

    .nav-menu a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary-blue);
      transition: width 0.3s;
    }

    .nav-menu a:hover::after {
      width: 100%;
    }

    .nav-actions {
      display: flex;
      gap: 20px;
    }

    .nav-btn {
      padding: 8px 24px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .login-btn {
      background: transparent;
      border: 1px solid #ddd;
      color: var(--text-dark);
    }

    .login-btn:hover {
      background: var(--secondary-blue);
      border-color: var(--primary-blue);
    }

    .signup-btn {
      background: var(--primary-blue);
      border: none;
      color: white;
    }

    .signup-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* 个人主页内容 */
    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
    }

    /* 可编辑资料模块 */
    .profile-card {
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 40px;
      margin-bottom: 30px;
      position: relative;
    }

    .edit-trigger {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      color: var(--primary-blue);
      transition: color 0.3s;
    }

    .edit-trigger:hover {
      color: darken(var(--primary-blue), 10%);
    }

    .avatar-section {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .avatar-image {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary-blue);
      transition: transform 0.3s;
    }

    .avatar-image:hover {
      transform: scale(1.05);
    }

    /* 作品展示区 */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .portfolio-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.3s;
      opacity: 0;
      transform: translateY(20px);
    }

    .portfolio-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .portfolio-card:hover {
      transform: translateY(-5px);
    }

    .portfolio-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .portfolio-info {
      padding: 20px;
    }

    /* 编辑模态框 */
    .edit-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: linear-gradient(135deg, #e6f7ff 0%, #f0faff 100%);
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 16px;
      animation: modalSlide 0.3s ease-out;
      box-shadow: var(--shadow);
    }

    @keyframes modalSlide {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* 编辑模态框表单样式 */
    .modal-content label {
      display: block;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: var(--transition);
      margin-bottom: 1.5rem;
    }

    .modal-content input:focus,
    .modal-content textarea:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.2);
    }

    .modal-content button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: var(--primary-blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .modal-content button[type="submit"]:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* 关闭按钮样式 */
    .modal-content .text-gray-500 {
      color: #757575;
      transition: color 0.3s;
    }

    .modal-content .text-gray-500:hover {
      color: #424242;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .nav-content {
        flex-wrap: wrap;
        justify-content: center;
        height: auto;
        padding: 10px 0;
      }
      .nav-menu {
        gap: 20px;
        margin-top: 10px;
      }
      .nav-actions {
        margin-top: 10px;
      }
      .main-container {
        padding: 15px;
      }
      .profile-card {
        padding: 20px;
      }
      .avatar-section {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .portfolio-grid {
        grid-template-columns: 1fr;
      }
      .modal-content {
        margin: 20px;
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-content">
      <img src="{% static 'images/logo/LOGO.png' %}" alt="Logo" class="nav-logo">
      <ul class="nav-menu">
        <li><a href="{{ url 'index' }}">首页</a></li>
        <li><a href="{{ url 'creation' }}">创作中心</a></li>
        <li><a href="{{ url 'agreement' }}">用户协议</a></li>
        <li><a href="{{ url 'profile' }}">个人主页</a></li>
      </ul>
      <div class="nav-actions">
        <a href="{{ url_for('login') }}"><button class="nav-btn login-btn">登录</button></a>
        <a href="{{ url_for('login') }}"><button class="nav-btn signup-btn">免费试用</button></a>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="main-container">
    <!-- 个人资料 -->
    <div class="profile-card">
      <div class="edit-trigger" onclick="openEditModal()">
        <i class="fas fa-edit"></i> 编辑资料
      </div>

      <div class="avatar-section">
        <img src="{% static 'images/个人主页/头像.jpg' %}" alt="用户头像" class="avatar-image">
        <div>
          <h1 id="profileName">001设计师</h1>
          <p id="profileBio">数字艺术创作者 | AI绘画探索者</p>
          <div class="social-links">
            <a href="#" id="weiboLink"><i class="fab fa-weibo"></i></a>
            <a href="#" id="zhihuLink"><i class="fab fa-zhihu"></i></a>
            <a href="#" id="githubLink"><i class="fab fa-github"></i></a>
          </div>
        </div>
      </div>

      <!-- 作品展示 -->
      <h2>我的作品（<span id="workCount">0</span>）</h2>
      <div class="portfolio-grid" id="portfolioGrid"></div>
    </div>
  </div>

  <!-- 编辑模态框 -->
  <div class="edit-modal" id="editModal">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-6">
        <h3>编辑个人资料</h3>
        <button onclick="closeEditModal()" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <form id="profileForm" class="space-y-4">
        <div>
          <label>姓名</label>
          <input type="text" id="editName" required class="w-full p-2 border rounded">
        </div>

        <div>
          <label>个人简介</label>
          <textarea id="editBio" rows="4" required class="w-full p-2 border rounded"></textarea>
        </div>

        <div>
          <label>社交链接</label>
          <div class="space-y-2">
            <div class="flex items-center gap-2">
              <i class="fab fa-weibo"></i>
              <input type="url" id="editWeibo" placeholder="微博链接" class="w-full p-2 border rounded">
            </div>
            <div class="flex items-center gap-2">
              <i class="fab fa-zhihu"></i>
              <input type="url" id="editZhihu" placeholder="知乎链接" class="w-full p-2 border rounded">
            </div>
            <div class="flex items-center gap-2">
              <i class="fab fa-github"></i>
              <input type="url" id="editGithub" placeholder="GitHub链接" class="w-full p-2 border rounded">
            </div>
          </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
          保存修改
        </button>
      </form>
    </div>
  </div>

  <script>
    // 用户数据
    let userData = {
      profile: {
        name: '001设计师',
        bio: '数字艺术创作者 | AI绘画探索者',
        social: {
          weibo: '#',
          zhihu: '#',
          github: '#'
        }
      },
      portfolio: [
        {
          title: "梦幻星空",
          image: "{% static 'images/个人主页/照片墙4.png' %}",
          description: "瞧，这一方木桌之上，AI 绘就了多彩文具小世界。五彩的笔似灵动音符，便利贴如缤纷彩笺，线圈本静静伫立，直尺与橡皮点缀其间，似在诉说书写与创意的故事。",
          type: "AI生成",
          date: "2025-04-01"
        },
        {
          title: "传统钢笔",
          image: "{% static 'images/个人主页/照片墙5.png' %}",
          description: "这是一幅经由 AI 绘就的文具图景，钢笔、铅笔、橡皮与本子有序铺陈，在光影交织间，似奏响一曲静谧的书写前奏曲，简约而不失雅致。",
          type: "AI生成",
          date: "2025-04-01"
        }
      ]
    };

    // 初始化页面
    function initPage() {
      // 加载本地数据
      const savedData = localStorage.getItem('userData');
      if (savedData) userData = JSON.parse(savedData);

      // 渲染个人资料
      document.getElementById('profileName').textContent = userData.profile.name;
      document.getElementById('profileBio').textContent = userData.profile.bio;
      document.getElementById('weiboLink').href = userData.profile.social.weibo;
      document.getElementById('zhihuLink').href = userData.profile.social.zhihu;
      document.getElementById('githubLink').href = userData.profile.social.github;

      // 渲染作品集
      renderPortfolio();
    }

    // 渲染作品
    function renderPortfolio() {
      const container = document.getElementById('portfolioGrid');
      const countSpan = document.getElementById('workCount');

      container.innerHTML = userData.portfolio.map(item => `
                <div class="portfolio-card">
                    <img src="${item.image}" alt="${item.title}" class="portfolio-image">
                    <div class="portfolio-info">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                        <div class="flex justify-between mt-2 text-sm text-gray-500">
                            <span>${item.type}</span>
                            <span>${item.date}</span>
                        </div>
                    </div>
                </div>
            `).join('');

      countSpan.textContent = userData.portfolio.length;

      // 触发入场动画
      document.querySelectorAll('.portfolio-card').forEach((card, index) => {
        setTimeout(() => card.classList.add('visible'), index * 100);
      });
    }

    // 模态框控制
    function openEditModal() {
      document.getElementById('editModal').style.display = 'block';
      document.getElementById('editName').value = userData.profile.name;
      document.getElementById('editBio').value = userData.profile.bio;
      document.getElementById('editWeibo').value = userData.profile.social.weibo;
      document.getElementById('editZhihu').value = userData.profile.social.zhihu;
      document.getElementById('editGithub').value = userData.profile.social.github;
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    // 保存修改
    document.getElementById('profileForm').addEventListener('submit', function (e) {
      e.preventDefault();

      userData.profile = {
        name: document.getElementById('editName').value,
        bio: document.getElementById('editBio').value,
        social: {
          weibo: document.getElementById('editWeibo').value,
          zhihu: document.getElementById('editZhihu').value,
          github: document.getElementById('editGithub').value
        }
      };

      localStorage.setItem('userData', JSON.stringify(userData));
      initPage();
      closeEditModal();
    });

    // 初始化
    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>

</html>
