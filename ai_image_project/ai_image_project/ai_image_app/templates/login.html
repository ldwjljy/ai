<!DOCTYPE html>
<html lang="zh-CN">
{% load static %}

<head>
  <meta charset="UTF-8">
  <!-- 添加 viewport 元标签 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="ljy" content="width=device-width, initial-scale=1.0">
  <title>文韵智能AI图像生成平台-登录</title>
  <!-- Font Awesome 图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="shortcut icon" href="{% static 'images/logo/LOGO.png' %}" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/logo/LOGO.png' %}">
  <link rel="apple-touch-icon" href="{% static 'images/logo/LOGO.png' %}">
  <style>
    :root {
      --primary-color: #1890ff;
      --secondary-color: #f0f2f5;
      --text-dark: #2d3436;
      --text-light: #ffffff;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    /* 登录容器 */
    .login-container {
      margin: auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 2.5rem 3rem;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
      transform: translateY(-10%);
      backdrop-filter: blur(10px);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo img {
      width: 120px;
      height: auto;
    }

    /* 表单样式 */
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-label {
      display: block;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: var(--transition);
      padding-left: 40px;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.2);
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 38px;
      color: #757575;
    }

    /* 记住我 & 忘记密码 */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.5rem 0;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .remember-me input {
      width: 16px;
      height: 16px;
    }

    .forgot-password {
      color: var(--primary-color);
      text-decoration: none;
      font-size: 0.9rem;
    }

    /* 登录按钮 */
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary-color);
      color: var(--text-light);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* 第三方登录 */
    .social-login {
      margin-top: 2rem;
      text-align: center;
    }

    .social-title {
      color: #757575;
      margin-bottom: 1rem;
      position: relative;
    }

    .social-title::before,
    .social-title::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #e0e0e0;
    }

    .social-title::before {
      left: 0;
    }

    .social-title::after {
      right: 0;
    }

    .social-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .social-btn {
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: var(--transition);
    }

    .social-btn:hover {
      background: var(--secondary-color);
    }

    /* 注册链接 */
    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-dark);
    }

    .register-link a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }

    /* 响应式设计 */
    @media (max-width: 480px) {
      .login-container {
        padding: 1.5rem;
        margin: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo">
      <img src="{% static 'images/logo/LOGO.png' %}" alt="Logo">
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">邮箱</label>
        <i class="fas fa-user input-icon"></i>
        <input type="email" id="email" class="input-field" placeholder="请输入邮箱" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="password" class="input-field" placeholder="请输入密码" minlength="6" required>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox"> 记住我
        </label>
        <a href="#" class="forgot-password">忘记密码？</a>
      </div>

      <button type="submit" class="login-btn">立即登录</button>
    </form>

    <div class="social-login">
      <div class="social-title">其他方式登录</div>
      <div class="social-buttons">
        <button class="social-btn">
          <i class="fab fa-weixin"></i>
        </button>
        <button class="social-btn">
          <i class="fab fa-qq"></i>
        </button>
        <button class="social-btn">
          <i class="fab fa-github"></i>
        </button>
      </div>
    </div>

    <p class="register-link">
      没有账号？<a href="register.html">立即注册</a>
    </p>
  </div>

  <script>
    // 表单验证
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // 简单验证示例
      if (!validateEmail(email)) {
        alert('请输入有效的邮箱地址');
        return;
      }

      if (password.length < 6) {
        alert('密码至少需要6位');
        return;
      }

      // 此处可添加AJAX提交
      console.log('提交登录:', { email, password });

      // 假设登录成功，跳转到首页
      // 由于没有提供Django的首页URL，这里暂时保留原跳转逻辑，你需要根据实际情况修改
      window.location.href = "/";
    });

    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }
  </script>
</body>

</html>
